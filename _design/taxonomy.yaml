# ============================================================================
# NODE 9: EVIDENCE QUALITY
# Source: IPCC evidence standards + GGA satellite indicator initiative
# ============================================================================

evidence_quality:
  label: "Evidence Quality"
  definition: >
    How well-supported is the claim in the passage? Apply conservatively —
    the most common error is evidence quality inflation (marking 'planned' as
    'implemented'). When in doubt, assign the lower quality level.
  seed_source: "IPCC evidence standards + GGA indicator initiative"

  anecdotal:
    label: "Anecdotal"
    definition: "Single observation, no systematic data, qualitative description only"
    examples:
      - "We observed that our suppliers experienced flooding last year"

  planned:
    label: "Planned / committed"
    definition: "The company states an intention or commitment but implementation has not begun"
    examples:
      - "We plan to install flood barriers at our Rotterdam facility by 2026"
    escalation_trigger: "Qualifying language: 'plan to', 'intend to', 'committed to', 'will'"

  implemented:
    label: "Implemented"
    definition: "The action has been completed or is actively underway"
    examples:
      - "Flood barriers were installed at our Rotterdam facility in Q3 2024"
    note: "Do NOT use if the source only says the action is 'planned' or 'in progress'"

  monitored:
    label: "Monitored with internal data"
    definition: "Ongoing tracking with internal measurement systems; data reported"
    examples:
      - "Water withdrawal tracked quarterly at all 23 facilities; 2024 reduction: 12%"

  satellite_verified:
    label: "Satellite-verified / Earth observation-verified"
    seed_source: "GGA satellite indicator initiative"
    definition: >
      Outcome independently verified using Earth Observation data. Sits between
      'monitored' and 'independently_verified'. Examples: crop coverage, flood
      extent, vegetation health, deforestation change.
    examples:
      - "Satellite data confirms 15,000 hectares of watershed restored (Copernicus-verified)"

  independently_verified:
    label: "Independently verified (third-party audit)"
    definition: "External third party has audited and verified the claim"
    review_trigger: "ALWAYS requires human review — never auto-approve"
    examples:
      - "Physical risk assessment independently verified by [auditor] against ISO 14090"

  peer_reviewed:
    label: "Peer-reviewed scientific evidence"
    definition: "Published in a peer-reviewed journal or IPCC report"
    examples:
      - "Per IPCC AR6 WG2 Chapter 5, global food production losses of 2-6% per decade are projected"


